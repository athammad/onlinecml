site_name: OnlineCML
site_description: Online Causal Machine Learning in Python
site_url: https://docs.onlinecml.org
repo_url: https://github.com/yourname/onlinecml
repo_name: yourname/onlinecml

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting_started/installation.md
    - Quickstart: getting_started/quickstart.md
  - API Reference:
    - Base: api_reference/base.md
    - Propensity: api_reference/propensity.md
    - Reweighting: api_reference/reweighting.md
    - Meta-Learners: api_reference/metalearners.md
    - Policy: api_reference/policy.md
    - Diagnostics: api_reference/diagnostics.md
    - Datasets: api_reference/datasets.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
